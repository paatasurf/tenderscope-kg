# TenderScope Quality Gate — tenderscope-kg
#
# Repository-specific CI. Graph is a projection — tests must not require
# production scraper DB. See bc-tender-scraper docs/engineering/ for ecosystem guide.

name: Quality Gate

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: quality-gate-kg-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,rest]"
          pip install pytest-cov

      - name: Static validation (ruff)
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Graph + contract + intelligence tests
        run: |
          mkdir -p reports
          pytest tests \
            -v --tb=short \
            --cov=tenderscope_kg \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:reports/coverage.xml \
            --junitxml=reports/unit-junit.xml \
            | tee reports/pytest-unit.txt

      - name: Deployment readiness summary
        if: always()
        run: python scripts/ci_summary.py

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-kg-${{ github.run_id }}
          path: reports/
          if-no-files-found: ignore
          retention-days: 14
